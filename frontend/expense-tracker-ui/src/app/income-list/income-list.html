<div class="income-container">

<h2>Income List</h2>

<table class="income-table">

<thead>

<tr>

<th>Title</th>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let i of incomes">

<td>{{i.title}}</td>

<td class="amount">
₹{{i.amount}}
</td>

<td>{{i.category}}</td>

<td>{{i.date | date:'mediumDate'}}</td>

<td>

<button
class="delete-btn"
(click)="deleteIncome(i._id)"
>
Delete
</button>

</td>

</tr>

<tr *ngIf="incomes.length === 0">

<td colspan="5" class="empty">

No income records found

</td>

</tr>

</tbody>

</table>

</div>

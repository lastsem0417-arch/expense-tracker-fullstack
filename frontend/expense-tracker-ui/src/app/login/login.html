<div class="login-box">

<h2>Login</h2>

<input
type="email"
placeholder="Email"
[(ngModel)]="email"
/>

<input
type="password"
placeholder="Password"
[(ngModel)]="password"
/>
<button (click)="login()" [disabled]="loading">

<span *ngIf="!loading">Login</span>

<span *ngIf="loading">Logging in...</span>

</button>
<p class="error" *ngIf="errorMessage">
{{errorMessage}}
</p>

</div>
